name: wheels

# Build Apple-Silicon wheels. Run manually (Actions tab -> Run workflow) or on a
# version tag. Publishing to PyPI is intentionally NOT wired up (needs a
# PYPI_API_TOKEN secret) — wheels are uploaded as build artifacts you can
# download or attach to a GitHub release.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: macos-26            # Apple Silicon (arm64) with Xcode 26 -> builds
                                 # the metal4.0 MPP (M5) metallib, not just simdgroup
    strategy:
      fail-fast: false
      matrix:
        # One wheel per (Python, torch ABI). A torch C++ extension is tied to the
        # torch version it is built against. Pinned to torch that runs on the
        # macos-26 build/test image — torch <= 2.7 (early 2025) predates macOS 26
        # and its own MPS backend fails to JIT-compile there. Widen as newer torch
        # releases land (each addition needs a green run on this image).
        python: ["3.11", "3.12", "3.13"]
        torch: ["2.12.*"]
    env:
      # Broad install range; the metal4.0 MPP path is gated at runtime so a
      # low deployment target is fine (the extension weak-links MPP).
      MACOSX_DEPLOYMENT_TARGET: "13.0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      # Pin Xcode 26.2 (the metal4.0 baseline the MPP path targets, so the
      # metallib's min-OS matches the macOS 26.2 runtime gate) and fetch the
      # Metal compiler component. If metal4.0 ever isn't buildable, setup.py
      # probes and falls back to a simdgroup-only wheel.
      - name: Select Xcode 26.2 + Metal toolchain
        run: |
          sudo xcode-select -s /Applications/Xcode_26.2.app
          sudo xcodebuild -downloadComponent MetalToolchain || true

      - name: Install build deps + torch
        run: |
          python -m pip install -U pip setuptools wheel build numpy
          python -m pip install "torch==${{ matrix.torch }}"

      - name: Build wheel
        run: python -m build --wheel --no-isolation

      - name: Verify wheel
        run: |
          python -m pip install dist/*.whl
          echo "== wheel metallibs =="
          unzip -l dist/*.whl | grep '\.metallib' || true
          # Hard gate: the metal4.0 MPP metallib must be in the wheel (the whole
          # reason we build on macos-26); a missing one = a degraded simdgroup-only
          # wheel, so fail rather than silently ship it.
          if unzip -l dist/*.whl | grep -q mtlattn_mpp.metallib; then
            echo "::notice::MPP metallib present — full M5 wheel"
          else
            echo "::error::MPP metallib missing — metal4.0 build failed"; exit 1
          fi
          # Hard gate: the wheel imports (loads the extension, finds the metallibs).
          cd "$RUNNER_TEMP" && python -c "import mtlattn; print('import ok')"
          # Best-effort: GitHub's hosted runner can't reliably JIT-compile torch's
          # own MPS shaders (transpose, ndArrayIdentity, ...), so the GPU suite may
          # abort there. Kernel correctness is validated locally on real Apple
          # Silicon; don't fail the build on the runner's MPS limitations.
          MTLATTN_SKIP_SDPA=1 python "$GITHUB_WORKSPACE/tests/test_correctness.py" \
            || echo "::warning::GPU correctness suite unavailable on this runner (torch/MPS JIT); validated locally"

      - uses: actions/upload-artifact@v4
        with:
          name: mtlattn-py${{ matrix.python }}-torch${{ matrix.torch }}
          path: dist/*.whl

  # Publish to PyPI via Trusted Publishing (OIDC) on a v* tag. No token: PyPI
  # is configured with this repo + workflow (wheels.yml) + environment "pypi".
  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write          # mint the short-lived OIDC token
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true   # collect every matrix wheel into dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
